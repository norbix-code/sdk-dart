name: Release

on:
  push:
    branches: [main, next, beta]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/norbix-dart
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install x tool
        run: dotnet tool install --global x

      - name: Install release tooling
        run: npm ci

      - name: Install Dart dependencies
        run: dart pub get

      - name: Generate references and SDK
        run: |
          python3 scripts/sync_types.py
          python3 scripts/generate_endpoints.py

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: npx semantic-release
