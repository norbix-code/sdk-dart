issue_tracker: https://github.com/norbix-dev/norbix-dart/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  http: ^1.2.0
  meta: ^1.10.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
